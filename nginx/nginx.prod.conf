events {
    worker_connections 1024;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Set max upload size
    client_max_body_size 500M;
    
    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # Redirect all domain HTTP traffic to HTTPS
    server {
        listen 80;
        server_name melittologist.org www.melittologist.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS server config
    server {
        listen 443 ssl;
        server_name melittologist.org www.melittologist.org;

        # SSL certificate files
        ssl_certificate     /etc/nginx/ssl/melittologist.org_fullchain.crt;
        ssl_certificate_key /etc/nginx/ssl/melittologist.org.key;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Serve React app static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;  # SPA fallback
        }

        # Proxy API requests to Node.js
        location /api/ {
            proxy_pass http://server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}